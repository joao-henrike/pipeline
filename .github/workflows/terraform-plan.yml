# =============================================================================
# WORKFLOW: Terraform Plan
# Executa em todo Pull Request que altera arquivos do terraform
# Valida a sintaxe e gera o plan de ambas as clouds como comentário no PR.
# =============================================================================
name: Terraform Plan

on:
  pull_request:
    branches: [main, master]
    paths:
      - "aws/**"
      - "azure/**"
      - ".github/workflows/terraform-plan.yml"

permissions:
  contents: read
  pull-requests: write

jobs:
  # ── Validação e Plan AWS
  plan-aws:
    name: Plan AWS
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: aws

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.5"

      - name: Terraform Init
        env:
          AWS_ACCESS_KEY_ID:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION:    us-east-1
        run: terraform init -backend=false

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: Terraform Plan (sem credenciais reais)
        env:
          AWS_ACCESS_KEY_ID:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION:    us-east-1
        run: |
          terraform plan -no-color \
            -var="student_name=${{ vars.STUDENT_NAME || 'ci-test' }}" \
            -var="vpn_shared_key=CITestKey1234" \
            -out=tfplan.aws 2>&1 | tee plan_aws.txt || true
          echo "## 📋 AWS Plan" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          tail -30 plan_aws.txt >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

      - name: Comentar Plan no PR (AWS)
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request'
        with:
          script: |
            const fs = require("fs");
            let plan = "";
            try { plan = fs.readFileSync("aws/plan_aws.txt", "utf8").slice(-3000); }
            catch { plan = "Plan não disponível"; }
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `### ☁️ AWS Terraform Plan\n\`\`\`hcl\n${plan}\n\`\`\``
            });

  # ── Validação e Plan Azure
  plan-azure:
    name: Plan Azure
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: azure

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.5"

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
        continue-on-error: true

      - name: Terraform Init
        env:
          ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
          ARM_TENANT_ID:       ${{ secrets.ARM_TENANT_ID }}
          ARM_CLIENT_ID:       ${{ secrets.ARM_CLIENT_ID }}
          ARM_CLIENT_SECRET:   ${{ secrets.ARM_CLIENT_SECRET }}
        run: terraform init -backend=false

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: Summary de Validação
        run: |
          echo "## ✅ Azure Terraform Validado" >> $GITHUB_STEP_SUMMARY
          echo "- Versão: $(terraform version -json | python3 -c 'import sys,json;print(json.load(sys.stdin)["terraform_version"])')" >> $GITHUB_STEP_SUMMARY
          echo "- Arquivos: $(find . -name "*.tf" | wc -l) .tf files validados" >> $GITHUB_STEP_SUMMARY

  # ── Validação Python Backend
  validate-backend:
    name: Validate Backend Python
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          # AQUI ESTA A CORRECAO: aspas simples dentro do bloco de expressao
          key: pip-${{ hashFiles('backend/requirements.txt') }}

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Syntax check Python
        run: |
          python -m py_compile main.py
          find app/ -name "*.py" -exec python -m py_compile {} \;
          echo "✅ Todos os arquivos Python passaram no syntax check"

      - name: Teste de importação
        run: python -c "import main; print('✅ main.py importado com sucesso')"
        env:
          CLOUD_PROVIDER: AWS
          STUDENT_NAME: ci-test

      - name: Verificar tipos com mypy (não bloqueia)
        run: |
          pip install mypy -q
          mypy app/ --ignore-missing-imports --no-strict-optional 2>&1 || true

# =============================================================================
# ALERTMANAGER CONFIG
# Configuração básica — adicione receivers de email/Slack conforme necessário
# =============================================================================
global:
  resolve_timeout: 5m

route:
  group_by: ["alertname", "cloud"]
  group_wait:      30s
  group_interval:  5m
  repeat_interval: 4h
  receiver: "default"

  routes:
    - match:
        severity: critical
      receiver: "critical"
      repeat_interval: 1h

receivers:
  - name: "default"
    # webhook_configs:
    #   - url: "https://hooks.slack.com/services/..."
    #     send_resolved: true

  - name: "critical"
    # email_configs:
    #   - to: "admin@exemplo.com"
    #     from: "alertmanager@exemplo.com"
    #     smarthost: "smtp.gmail.com:587"
    #     auth_username: "..."
    #     auth_password: "..."

inhibit_rules:
  - source_match:
      severity: critical
    target_match:
      severity: warning
    equal: ["instance"]

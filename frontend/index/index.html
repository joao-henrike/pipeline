<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechStock Enterprise | Honey Badger</title>
    <link rel="stylesheet" href="../css/painel.css">
</head>
<body>
    <div class="erp-layout">
        
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="brand-logo">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/></svg>
                </div>
                <div class="brand-details">
                    <span class="company-name">TechStock</span>
                    <span class="org-name">Alpha Tech Group</span>
                </div>
                <button class="btn-icon collapse-trigger" id="btn-collapse" title="Recolher Menu">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
                </button>
            </div>

            <div class="sidebar-scrollarea">
                <nav class="sidebar-nav">
                    <div class="nav-group">
                        <span class="group-label">Operações Core</span>
                        
                        <a href="#" class="nav-item" data-page="dashboard">
                            <svg class="nav-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="7" height="9" x="3" y="3" rx="1"/><rect width="7" height="5" x="14" y="3" rx="1"/><rect width="7" height="9" x="14" y="12" rx="1"/><rect width="7" height="5" x="3" y="16" rx="1"/></svg>
                            <span class="nav-label">Dashboard</span>
                        </a>
                        
                        <a href="#" class="nav-item active" data-page="inventario">
                            <svg class="nav-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z"/><path d="m3.3 7 8.7 5 8.7-5"/><path d="M12 22V12"/></svg>
                            <span class="nav-label">Gestão de Inventário</span>
                        </a>
                        
                        <a href="#" class="nav-item" data-page="movimentacoes">
                            <svg class="nav-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 3v18"/><path d="m10 18-3 3-3-3"/><path d="M7 21V3"/><path d="m14 6 3-3 3 3"/></svg>
                            <span class="nav-label">Transações de Estoque</span>
                        </a>
                    </div>

                    <div class="nav-group">
                        <span class="group-label">Administração & Rede</span>
                        
                        <a href="#" class="nav-item" data-page="secops">
                            <svg class="nav-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
                            <span class="nav-label">Auditoria (SecOps)</span>
                        </a>

                        <a href="#" class="nav-item" data-page="integracoes">
                            <svg class="nav-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.5 19c2.485 0 4.5-2.015 4.5-4.5S19.985 10 17.5 10H16c-1.657 0-3-1.343-3-3s1.343-3 3-3h.5C14.015 4 12 6.015 12 8.5V11M6.5 5C4.015 5 2 7.015 2 9.5S4.015 14 6.5 14H8c1.657 0 3 1.343 3 3s-1.343 3-3 3h-.5C9.985 20 12 17.985 12 15.5V13"/></svg>
                            <span class="nav-label">Gateway AWS/Azure</span>
                            <span class="nav-badge alert">WIP</span>
                        </a>

                        <a href="#" class="nav-item" data-page="configuracoes">
                            <svg class="nav-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20a8 8 0 1 0 0-16 8 8 0 0 0 0 16Z"/><path d="M12 14a2 2 0 1 0 0-4 2 2 0 0 0 0 4Z"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>
                            <span class="nav-label">Infraestrutura</span>
                        </a>
                    </div>
                </nav>
            </div>

            <div class="sidebar-footer">
                <div class="env-monitor">
                    <div class="env-line">
                        <span class="env-label">Cluster RDS</span>
                        <span class="env-value success">Estável</span>
                    </div>
                    <div class="env-line">
                        <span class="env-label">Latência API</span>
                        <span class="env-value">12ms</span>
                    </div>
                </div>
            </div>
        </aside>

        <main class="main-content">
            
            <header class="top-header">
                
                <div class="header-left">
                    <h1 class="page-title" id="current-module-title">Gestão de Inventário</h1>
                </div>

                <div class="header-center">
                    <button class="command-palette-btn" id="cmd-palette-trigger">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
                        <span>Buscar patrimônio, logs ou rotas...</span>
                        <kbd>Ctrl+K</kbd>
                    </button>
                </div>

                <div class="header-right">
                    <div class="system-status tooltip-trigger">
                        <span class="status-indicator online"></span>
                        <span class="status-text">AWS Operacional</span>
                        <div class="tooltip">Load Balancer: Roteando para 3 zonas.</div>
                    </div>

                    <div class="header-divider"></div>

                    <button class="btn-icon notification-trigger">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/></svg>
                        <span class="unread-badge">2</span>
                    </button>

                    <div class="user-dropdown">
                        <div class="avatar-circle">AD</div>
                        <svg class="chevron" xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg>
                    </div>
                </div>
            </header>

            <div class="workspace-area" id="workspace-area">
                </div>

        </main>
    </div>

    <script src="/config.js"></script>
    <script src="../js/painel.js"></script>
</body>
</html>

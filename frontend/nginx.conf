# =============================================================================
# nginx.conf — MultiCloud VPN Monitor Frontend
# Serve o dashboard estático e faz proxy para o backend FastAPI
# =============================================================================

server {
    listen 80;
    listen [::]:80;
    server_name _;

    # ── Root dos arquivos estáticos
    root /opt/multicloud-vpn-project/frontend/public;
    index index.html;

    # ── Gzip para performance
    gzip on;
    gzip_types text/css application/javascript application/json text/plain;
    gzip_min_length 1024;

    # ── Cache para assets estáticos (1 semana)
    location ~* \.(css|js|png|jpg|svg|ico|woff2)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # ── Proxy para o backend FastAPI (API calls)
    location /api/ {
        proxy_pass         http://BACKEND_PRIVATE_IP:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_read_timeout    30s;

        # CORS headers
        add_header Access-Control-Allow-Origin  "*" always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type" always;

        if ($request_method = OPTIONS) {
            return 204;
        }
    }

    # ── SPA fallback: todas as rotas retornam index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Health check endpoint do próprio Nginx
    location /health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }
}

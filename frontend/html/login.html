<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechStock | Authentication</title>
    <link rel="stylesheet" href="../css/login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="split-layout">
        
        <div class="left-panel">
            <div class="left-header">
                <div class="brand-logo">TECHSTOCK</div>
            </div>
            
            <div class="left-footer">
                <h2>Securing Infrastructure,<br>Empowering Operations</h2>
                <div class="carousel-indicators">
                    <span class="dot active"></span>
                    <span class="dot"></span>
                    <span class="dot"></span>
                    <span class="dot"></span>
                </div>
            </div>
        </div>

        <div class="right-panel">
            
            <div id="register-section" class="form-container">
                <h1 class="page-title">Create an account</h1>
                <p class="subtitle">Already have an account? <button type="button" class="text-btn" onclick="toggleForms('login')">Log in</button></p>

                <form id="register-form">
                    <div class="input-row">
                        <input type="text" id="reg-firstname" class="input-field" placeholder="First name" required>
                        <input type="text" id="reg-lastname" class="input-field" placeholder="Last name" required>
                    </div>
                    
                    <input type="email" id="reg-email" class="input-field" placeholder="Email" required>
                    
                    <div class="password-wrapper">
                        <input type="password" id="reg-password" class="input-field" placeholder="Enter your password" required>
                        <i class="fa-regular fa-eye toggle-password" onclick="togglePasswordVisibility('reg-password')"></i>
                    </div>

                    <div class="checkbox-group">
                        <label class="custom-checkbox">
                            <input type="checkbox" required>
                            <span class="checkmark"></span>
                            <span class="check-text">I agree to the <a href="#">Terms & Conditions</a></span>
                        </label>
                    </div>

                    <button type="submit" class="btn-primary">Create account</button>
                </form>

                <div class="divider"><span>Or register with</span></div>

                <div class="social-buttons">
                    <button type="button" class="btn-social">
                        <i class="fa-brands fa-google"></i> Google
                    </button>
                    <button type="button" class="btn-social">
                        <i class="fa-brands fa-apple"></i> Apple
                    </button>
                </div>
            </div>

            <div id="login-section" class="form-container hidden">
                <h1 class="page-title">Log in</h1>
                <p class="subtitle">Don't have an account? <button type="button" class="text-btn" onclick="toggleForms('register')">Create an account</button></p>

                <form id="login-form">
                    <input type="email" id="login-email" class="input-field" placeholder="Email" required>
                    
                    <div class="password-wrapper">
                        <input type="password" id="login-password" class="input-field" placeholder="Enter your password" required>
                        <i class="fa-regular fa-eye toggle-password" onclick="togglePasswordVisibility('login-password')"></i>
                    </div>

                    <div class="checkbox-group" style="justify-content: space-between;">
                        <label class="custom-checkbox">
                            <input type="checkbox">
                            <span class="checkmark"></span>
                            <span class="check-text">Remember me</span>
                        </label>
                        <a href="#" class="forgot-password">Forgot password?</a>
                    </div>

                    <button type="submit" class="btn-primary">Log in</button>
                </form>

                <div class="divider"><span>Or log in with</span></div>

                <div class="social-buttons">
                    <button type="button" class="btn-social">
                        <i class="fa-brands fa-google"></i> Google
                    </button>
                    <button type="button" class="btn-social">
                        <i class="fa-brands fa-apple"></i> Apple
                    </button>
                </div>
            </div>

        </div>
    </div>
    <script src="../js/login.js"></script>
</body>
</html>

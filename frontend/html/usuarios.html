<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechStock - Gestão de Usuários</title>
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/usuarios.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <nav class="sidebar">
        <div class="sidebar-header">
            <h2><i class="fas fa-box-open"></i> TechStock</h2>
            <p>Honey Badger IT</p>
        </div>
        <ul class="nav-links">
            <li><a href="inventario.html"><i class="fas fa-server"></i> Inventário</a></li>
            <li><a href="movimentacoes.html"><i class="fas fa-exchange-alt"></i> Movimentações</a></li>
            <li class="active"><a href="usuarios.html"><i class="fas fa-users"></i> Gestão de Usuários</a></li>
            <li><a href="dashboard.html"><i class="fas fa-chart-line"></i> Dashboard (Grafana)</a></li>
        </ul>
        <div class="sidebar-footer">
            <a href="login.html" class="logout-btn"><i class="fas fa-sign-out-alt"></i> Sair</a>
        </div>
    </nav>

    <main class="main-content">
        <header class="topbar">
            <h1>Gestão de Usuários</h1>
            <button class="btn-primary" id="btnNovoUsuario">
                <i class="fas fa-user-plus"></i> Adicionar Usuário
            </button>
        </header>

        <section class="table-container">
            <div class="table-controls">
                <input type="text" id="searchInput" placeholder="Buscar por nome ou e-mail..." class="search-bar">
                <select id="filterFuncao" class="filter-dropdown">
                    <option value="all">Todas as Funções</option>
                    <option value="administrador">Administrador</option>
                    <option value="operador">Operador</option>
                    <option value="auditor">Auditor</option>
                </select>
            </div>

            <table class="data-table">
                <thead>
                    <tr>
                        <th>Usuário</th>
                        <th>E-mail</th>
                        <th>Função</th>
                        <th>Status</th>
                        <th>Último Acesso</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="tabelaUsuarios"></tbody>
            </table>
        </section>
    </main>

    <div id="modalUsuario" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle">Adicionar Novo Usuário</h3>
                <button class="btn-close" id="btnFecharModal"><i class="fas fa-times"></i></button>
            </div>
            <form id="formUsuario">
                <input type="hidden" id="userIndex" value="-1">
                
                <div class="form-group">
                    <label for="inputNome">Nome Completo</label>
                    <input type="text" id="inputNome" class="form-input" placeholder="Ex: Linus Torvalds" required>
                </div>

                <div class="form-group">
                    <label for="inputEmail">E-mail Corporativo</label>
                    <input type="email" id="inputEmail" class="form-input" placeholder="Ex: linus@honeybadger.com" required>
                </div>

                <div class="form-grid">
                    <div class="form-group">
                        <label for="inputFuncao">Função / Nível de Acesso</label>
                        <select id="inputFuncao" class="form-input" required>
                            <option value="Administrador">Administrador</option>
                            <option value="Operador">Operador</option>
                            <option value="Auditor">Auditor</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="inputStatus">Status da Conta</label>
                        <select id="inputStatus" class="form-input" required>
                            <option value="Ativo">Ativo</option>
                            <option value="Inativo">Inativo</option>
                        </select>
                    </div>
                </div>

                <div class="modal-footer">
                    <button type="button" class="btn-secondary" id="btnCancelar">Cancelar</button>
                    <button type="submit" class="btn-primary">Salvar Usuário</button>
                </div>
            </form>
        </div>
    </div>

    <script src="../js/usuarios.js"></script>
</body>
</html>

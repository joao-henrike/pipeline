<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechStock - Movimentações</title>
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/movimentacoes.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <nav class="sidebar">
        <div class="sidebar-header">
            <h2><i class="fas fa-box-open"></i> TechStock</h2>
            <p>Honey Badger IT</p>
        </div>
        <ul class="nav-links">
            <li><a href="inventario.html"><i class="fas fa-server"></i> Inventário</a></li>
            <li class="active"><a href="movimentacoes.html"><i class="fas fa-exchange-alt"></i> Movimentações</a></li>
            <li><a href="usuarios.html"><i class="fas fa-users"></i> Gestão de Usuários</a></li>
            <li><a href="dashboard.html"><i class="fas fa-chart-line"></i> Dashboard (Grafana)</a></li>
        </ul>
        <div class="sidebar-footer">
            <a href="login.html" class="logout-btn"><i class="fas fa-sign-out-alt"></i> Sair</a>
        </div>
    </nav>

    <main class="main-content">
        <header class="topbar">
            <h1>Registro de Movimentações</h1>
            <button class="btn-primary" id="btnNovaMovimentacao">
                <i class="fas fa-exchange-alt"></i> Registrar Transação
            </button>
        </header>

        <section class="table-container">
            <div class="table-controls">
                <input type="text" id="searchInput" placeholder="Buscar por SKU ou Solicitante..." class="search-bar">
                <select id="filterTipo" class="filter-dropdown">
                    <option value="all">Todos os Tipos</option>
                    <option value="entrada">Entradas</option>
                    <option value="saida">Saídas</option>
                </select>
            </div>

            <table class="data-table">
                <thead>
                    <tr>
                        <th>Data/Hora</th>
                        <th>Tipo</th>
                        <th>SKU</th>
                        <th>Qtd</th>
                        <th>Solicitante / Destino</th>
                        <th>Operador</th>
                    </tr>
                </thead>
                <tbody id="tabelaMovimentacoes"></tbody>
            </table>
        </section>
    </main>

    <div id="modalMov" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Registrar Movimentação</h3>
                <button class="btn-close" id="btnFecharModal"><i class="fas fa-times"></i></button>
            </div>
            <form id="formMovimentacao">
                <div class="form-grid">
                    <div class="form-group">
                        <label for="inputTipo">Tipo de Transação</label>
                        <select id="inputTipo" class="form-input" required>
                            <option value="Saída">Saída (Retirada)</option>
                            <option value="Entrada">Entrada (Devolução/Nova Carga)</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="inputSku">SKU do Equipamento</label>
                        <input type="text" id="inputSku" class="form-input" placeholder="Ex: SRV-001" required>
                    </div>
                </div>

                <div class="form-grid">
                    <div class="form-group">
                        <label for="inputQtd">Quantidade</label>
                        <input type="number" id="inputQtd" class="form-input" min="1" required>
                    </div>
                    <div class="form-group">
                        <label for="inputDestino">Solicitante/Destino</label>
                        <input type="text" id="inputDestino" class="form-input" placeholder="Ex: João - BI" required>
                    </div>
                </div>

                <div class="modal-footer">
                    <button type="button" class="btn-secondary" id="btnCancelar">Cancelar</button>
                    <button type="submit" class="btn-primary">Confirmar Transação</button>
                </div>
            </form>
        </div>
    </div>

    <script src="../js/movimentacoes.js"></script>
</body>
</html>
